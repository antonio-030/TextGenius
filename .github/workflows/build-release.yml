name: Build, Sign and Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --clean --noconfirm build/textgenius.spec

      - name: Create DLL manifest
        run: python tools/post_build.py

      - name: Build installer
        run: |
          choco install innosetup -y
          iscc installer/setup.iss

      - name: Sign installer with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: '3bcbb65a-8154-407f-a07b-c575fd4d499c'
          project-slug: 'TextGenius'
          signing-policy-slug: 'TextGenius'
          input-artifact-path: 'dist/TextGenius-Setup-${{ github.ref_name }}.exe'
          output-artifact-path: 'dist/TextGenius-Setup-${{ github.ref_name }}-signed.exe'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TextGenius-Setup-*-signed.exe
            dist/TextGenius-Setup-*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
